<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Pasitos Certificados{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f3ff; min-height: 100vh; color: #1f2937; }

    /* Navbar */
    .navbar { background: #7c3aed; color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 60px; box-shadow: 0 2px 10px rgba(124,58,237,.35); }
    .navbar-brand { font-size: 1.15rem; font-weight: 800; color: #fff; text-decoration: none; letter-spacing: -.01em; }
    .navbar-brand span { opacity: .7; font-weight: 400; font-size: .85em; }
    .navbar-nav { display: flex; align-items: center; gap: .4rem; }
    .nav-link { color: rgba(255,255,255,.85); text-decoration: none; padding: .4rem .9rem; border-radius: 6px; font-size: .88rem; transition: background .15s; }
    .nav-link:hover { background: rgba(255,255,255,.15); color: #fff; }
    .btn-logout { color: #fff; text-decoration: none; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25); padding: .38rem .9rem; border-radius: 6px; font-size: .88rem; transition: background .15s; }
    .btn-logout:hover { background: rgba(255,255,255,.22); }

    /* Layout */
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Alerts */
    .alert { padding: .8rem 1.1rem; border-radius: 8px; margin-bottom: 1rem; font-size: .88rem; }
    .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    /* Cards */
    .card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,.07); }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: .3rem; padding: .5rem 1.2rem; border-radius: 8px; font-size: .88rem; font-weight: 500; text-decoration: none; cursor: pointer; border: none; transition: all .15s; }
    .btn-primary   { background: #7c3aed; color: #fff; }
    .btn-primary:hover   { background: #6d28d9; }
    .btn-secondary { background: #ede9fe; color: #5b21b6; }
    .btn-secondary:hover { background: #ddd6fe; }
    .btn-sm { padding: .3rem .75rem; font-size: .8rem; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    thead th { background: #f5f3ff; color: #5b21b6; font-weight: 600; padding: .7rem 1rem; text-align: left; border-bottom: 2px solid #ede9fe; white-space: nowrap; }
    tbody td { padding: .65rem 1rem; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafafa; }

    /* Typography */
    h1 { font-size: 1.45rem; color: #1f2937; margin-bottom: 1.5rem; font-weight: 700; }
    h2 { font-size: 1.1rem; color: #374151; margin-bottom: 1rem; font-weight: 600; }

    /* Forms */
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .82rem; font-weight: 600; color: #374151; margin-bottom: .3rem; }
    input[type=text], input[type=email], input[type=password], input[type=number], input[type=date], select, textarea {
      width: 100%; padding: .52rem .85rem; border: 1px solid #d1d5db; border-radius: 8px;
      font-size: .9rem; background: #fff; transition: border-color .15s, box-shadow .15s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.12); }

    /* Monospace badge */
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: .82rem; }

    @media (max-width: 640px) {
      .navbar-nav .nav-link { display: none; }
      .container { padding: 1rem; }
      h1 { font-size: 1.2rem; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="/dashboard">Pasitos <span>Certificados</span></a>
    <div class="navbar-nav">
      <a class="nav-link" href="/personas">Personas</a>
      <a class="nav-link" href="/certificados">Certificados</a>
      <a class="btn-logout" href="/logout">Cerrar sesión</a>
    </div>
  </nav>

  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
